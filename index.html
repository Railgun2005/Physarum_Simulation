<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slime Mold</title>

  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>

<body>

  <canvas id="simcanvas"></canvas>

  <div class="settings">

    <button id="fullscreen_btn">Fullscreen</button>

    <label for="sensor_distance">Sensor distance</label>
    <input id="sensor_distance" type="range" min="0" max="5" step="any">
    <span id="text_sensor_distance"></span>

    <label for="sensor_angle">Sensor angle</label>
    <input id="sensor_angle" type="range" min="0" max="3.14" step="any">
    <span id="text_sensor_angle"></span>

    <label for="turning_speed">Turning speed</label>
    <input id="turning_speed" type="range" min="0" max="3.14" step="any">
    <span id="text_turning_speed"></span>

    <label for="speed">Speed</label>
    <input id="speed" type="range" min="0" max="5" step="any">
    <span id="text_speed"></span>

    <label for="decay_factor">Decay factor</label>
    <input id="decay_factor" type="range" min="0" max="1" step="any">
    <span id="text_decay_factor"></span>

    <label for="deposit_amount">Deposit amount</label>
    <input id="deposit_amount" type="range" min="0" max="1" step="any">
    <span id="text_deposit_amount"></span>

    <label for="num_agents">Number of agents</label>
    <input id="num_agents" type="range" min="1" max="50000" step="1" onchange="regenerate_next=true">
    <span id="text_num_agents"></span>

    <label for="start_in_circle">Start in circle</label>
    <input id="start_in_circle" type="checkbox" onchange="regenerate_next=true">
    <span></span>

    <label for="highlight_agents">Highlight agents</label>
    <input id="highlight_agents" type="checkbox">
    <span></span>

    <label for="random_turning">Semi-random turning</label>
    <input id="random_turning" type="checkbox">
    <span></span>

    <label for="wrap_around">Wrap around</label>
    <input id="wrap_around" type="checkbox">
    <span></span>

    <label for="show_debug">Show debug</label>
    <input id="show_debug" type="checkbox">
    <span></span>

    <button id="reset_button" onclick="reset_settings()">
      Reset all
    </button>

  </div>

  <div id="debug" style="display:none">
    <div>
      <button onclick="skip(60)">Skip ahead 60 frames</button>
    </div>

    <div>
      <button onclick="skip(600)">Skip ahead 600 frames</button>
    </div>

    <div id="stats"></div>
  </div>

</body>
</html>
